<!DOCTYPE html>
<html lang="ne" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लग-इन | स्वस्तिक लघुवित्त</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 80px 20px 20px;
        }
        .auth-box {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            color: #1e3c72;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: #666;
            font-size: 1rem;
        }
        .auth-form .form-group {
            margin-bottom: 1.5rem;
        }
        .auth-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
        }
        .auth-form input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .auth-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
        }
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .forgot-password {
            text-align: right;
            margin-top: -1rem;
            margin-bottom: 1.5rem;
        }
        .forgot-password a {
            color: #667eea;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .social-login {
            margin-top: 1.5rem;
            text-align: center;
        }
        .social-login p {
            color: #666;
            margin-bottom: 1rem;
        }
        .social-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="स्वस्तिक लघुवित्त बित्तीय संस्था लिमिटेड">
                </a>
            </div>
            <div class="nav-container">
                <ul class="nav-links">
                    <li><a href="index.html">🏠 मुख्य पृष्ठ</a></li>
                    <li><a href="Service.html">💼 सेवाहरू</a></li>
                    <li><a href="about.html">ℹ️ हाम्रो बारेमा</a></li>
                    <li><a href="news.html">📰 समाचार</a></li>
                    <li><a href="contact.html">📞 सम्पर्क</a></li>
                    <li><a href="photos.html">📸 फोटोहरू</a></li>
                </ul>
                
                <div class="auth-buttons">
                    <a href="login.html" class="btn-login">लग-इन</a>
                    <a href="signup.html" class="btn-signup">दर्ता गर्नुहोस्</a>
                </div>
                <!-- <div class="search-bar">
                    <input type="text" placeholder="खोज्नुहोस्..." id="searchInput">
                    <button onclick="searchFunction()">🔍</button>
                </div> -->
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>लग-इन</h1>
                <p>स्वस्तिक लघुवित्तमा स्वागत छ</p>
            </div>
            <form class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>इमेल वा मोबाइल नम्बर *</label>
                    <input type="text" id="login_id" required placeholder="example@email.com वा 9800000000">
                </div>
                <div class="form-group">
                    <label>पासवर्ड *</label>
                    <input type="password" id="login_password" required placeholder="तपाईंको पासवर्ड">
                </div>
                <div class="forgot-password">
                    <a href="#">पासवर्ड बिर्सनुभयो?</a>
                </div>
                <button type="submit" class="btn-submit">लग-इन गर्नुहोस्</button>
            </form>
            <div class="social-login">
                <p>वा  माध्यमबाट जानुहोस्</p>
                <div class="social-buttons">
                    <button class="social-btn">
                        <span>G</span> Google
                    </button>
                    <button class="social-btn">
                        <span>f</span> Facebook
                    </button>
                </div>
            </div>
            <div class="auth-footer">
                <p>खाता छैन? <a href="signup.html">दर्ता गर्नुहोस्</a></p>
            </div>
        </div>
    </div>

    <script>
        // Mobile menu toggle
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Search function
        function searchFunction() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (query) {
                window.location.href = 'index.html#search=' + encodeURIComponent(query);
            }
        }

        // Handle login form submission
        function handleLogin(e) {
            e.preventDefault();
            
            const loginId = document.getElementById('login_id').value;
            const password = document.getElementById('login_password').value;
            
            // Simple validation (in real scenario, this would send data to server)
            if (loginId && password) {
                alert('🎉 लग-इन सफल भयो!\n\nस्वागत छ, ' + loginId + '!');
                window.location.href = 'index.html';
            } else {
                alert('❌ लग-इन असफल भयो। कृपया पुनः प्रयास गर्नुहोस्।');
            }
        }
    </script>
</body>
</html>
