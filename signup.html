<!DOCTYPE html>
<html lang="ne" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>दर्ता गर्नुहोस् | स्वस्तिक लघुवित्त</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 80px 20px 20px;
        }
        .auth-box {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            color: #1e3c72;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: #666;
            font-size: 1rem;
        }
        .auth-form .form-group {
            margin-bottom: 1.5rem;
        }
        .auth-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
        }
        .auth-form input, .auth-form select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .auth-form input:focus, .auth-form select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .auth-form .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-form .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
        }
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .terms {
            font-size: 0.9rem;
            color: #666;
            margin-top: 1rem;
        }
        .terms a {
            color: #667eea;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="स्वस्तिक लघुवित्त बित्तीय संस्था लिमिटेड">
                </a>
            </div>
            <div class="nav-container">
                <ul class="nav-links">
                    <li><a href="index.html">🏠 मुख्य पृष्ठ</a></li>
                    <li><a href="Service.html">💼 सेवाहरू</a></li>
                    <li><a href="about.html">ℹ️ हाम्रो बारेमा</a></li>
                    <li><a href="news.html">📰 समाचार</a></li>
                    <li><a href="contact.html">📞 सम्पर्क</a></li>
                    <li><a href="photos.html">📸 फोटोहरू</a></li>
                </ul>
                <!-- <div class="search-bar">
                    <input type="text" placeholder="खोज्नुहोस्..." id="searchInput">
                    <button onclick="searchFunction()">🔍</button>
                </div> -->
                <div class="auth-buttons">
                    <a href="login.html" class="btn-login">लग-इन</a>
                    <a href="signup.html" class="btn-signup">दर्ता गर्नुहोस्</a>
                </div>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <!-- Signup Form -->
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>दर्ता गर्नुहोस्</h1>
                <p>स्वस्तिक लघुवित्तमा आफ्नो खाता बनाउनुहोस्</p>
            </div>
            <form class="auth-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>पूरा नाम *</label>
                    <input type="text" id="fullname" required placeholder="तपाईंको पूरा नाम लेख्नुहोस्">
                </div>
                <div class="form-group">
                    <label>इमेल ठेगाना *</label>
                    <input type="email" id="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>मोबाइल नम्बर *</label>
                    <input type="tel" id="phone" required placeholder="9800000000" pattern="[9][0-9]{9}">
                </div>
                <div class="form-group">
                    <label>शहर/जिल्ला *</label>
                    <input type="text" id="city" required placeholder="तपाईंको शहर/जिल्ला">
                </div>
                <div class="form-group">
                    <label>पासवर्ड *</label>
                    <input type="password" id="password" required placeholder="कम्तिमा ८ अक्षर">
                </div>
                <div class="form-group">
                    <label>पासवर्ड पुष्टि गर्नुहोस् *</label>
                    <input type="password" id="confirm_password" required placeholder="पुनः पासवर्ड लेख्नुहोस्">
                </div>
                <div class="form-group">
                    <label>खाता प्रकार *</label>
                    <select id="account_type" required>
                        <option value="">छान्नुहोस्</option>
                        <option value="individual">व्यक्तिगत</option>
                        <option value="business">व्यापारी</option>
                        <option value="group">समूह</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">दर्ता गर्नुहोस्</button>
                <p class="terms">
                    दर्ता गरेर, तपाईं हाम्रो <a href="#">सेवा सर्तहरू</a> र <a href="#">गोपनीयता नीति</a> मा सहमत हुनुहुन्छ।
                </p>
            </form>
            <div class="auth-footer">
                <p>पहिले नै दर्ता हुनुभएको छ? <a href="login.html">लग-इन गर्नुहोस्</a></p>
            </div>
        </div>
    </div>

    <script>
        // Mobile menu toggle
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Search function
        function searchFunction() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (query) {
                window.location.href = 'index.html#search=' + encodeURIComponent(query);
            }
        }

        // Handle signup form submission
        function handleSignup(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (password !== confirmPassword) {
                alert('पासवर्ड मेल खाएन। कृपया पुनः प्रयास गर्नुहोस्।');
                return;
            }
            
            if (password.length < 8) {
                alert('पासवर्ड कम्तिमा ८ अक्षर हुनुपर्छ।');
                return;
            }
            
            // Show success message (in real scenario, this would send data to server)
            alert('🎉 दर्ता सफल भयो!\n\nतपाईंको इमेलमा पुष्टि लिङ्क पठाइएको छ।\n\nधन्यवाद!');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
